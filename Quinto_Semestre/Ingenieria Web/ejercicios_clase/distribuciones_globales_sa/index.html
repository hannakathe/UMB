<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distribuciones Globales S.A. — Iniciar Sesión</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">

  <div class="login-box">
    <!-- Header con branding -->
    <div class="login-header">
      <div class="logo-icon">
        <i data-lucide="package"></i>
      </div>
      <h1>Distribuciones Globales S.A.</h1>
      <p>Sistema de Gestión de Inventarios</p>
    </div>

    <!-- Formulario de login -->
    <div class="login-form-wrap">
      <h2>Iniciar Sesión</h2>

      <div class="alert alert-danger" id="loginError" style="display:none">
        <i data-lucide="alert-circle"></i>
        <span id="loginErrorMsg">Credenciales incorrectas</span>
      </div>

      <form id="loginForm" novalidate>
        <!-- Email -->
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input
            type="email"
            id="email"
            placeholder="correo@empresa.com"
            autocomplete="email"
          >
          <span class="error-msg" id="emailError"></span>
        </div>

        <!-- Contraseña -->
        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              autocomplete="current-password"
            >
            <span class="input-icon" id="togglePassword" title="Mostrar / Ocultar">
              <i data-lucide="eye"></i>
            </span>
          </div>
          <span class="error-msg" id="passwordError"></span>
        </div>

        <!-- Botón de ingreso -->
        <button type="submit" class="btn btn-primary btn-full" id="btnLogin">
          <i data-lucide="log-in"></i> Ingresar al Sistema
        </button>
      </form>

      <!-- Credenciales de demo -->
      <div class="login-hint">
        <strong>Admin:</strong> admin@distribuciones.com / admin123<br>
        <strong>Empleado:</strong> empleado@distribuciones.com / emp123
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
