<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="El Último Commit — Historia interactiva de ciencia ficción sobre IA y el destino de la humanidad.">
  <title>El Último Commit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cyan:   #00d4ff;
      --green:  #00ff88;
      --danger: #ff3d3d;
      --bg:     #0a0d12;
      --font:   'Share Tech Mono', 'Courier New', monospace;
    }
    body {
      background: var(--bg); color: #eee;
      font-family: var(--font);
      overflow: hidden; height: 100vh;
    }

    /* ── Fondo imagen de portada ── */
    #cover-bg {
      position: fixed; inset: 0;
      background: url('assets/img/cover.png') center/cover no-repeat;
      z-index: 0; transition: opacity .8s ease;
    }
    /* Degradado horizontal: oscuro a la izquierda, imagen visible a la derecha */
    #cover-bg::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(
        to right,
        rgba(10,13,18,.97) 0%,
        rgba(10,13,18,.85) 35%,
        rgba(10,13,18,.45) 60%,
        rgba(10,13,18,.10) 100%
      );
    }

    /* ── Canvas matrix rain ── */
    #matrix-canvas {
      position: fixed; inset: 0; z-index: 1;
      opacity: 0; transition: opacity 1.2s ease; pointer-events: none;
    }
    #matrix-canvas.active { opacity: 1; }

    /* ── Overlay negro para transición ── */
    #transition-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: var(--bg); opacity: 0;
      pointer-events: none; transition: opacity .7s ease;
    }
    #transition-overlay.active { opacity: 1; pointer-events: all; }

    /* ── Contenido de portada — alineado a la IZQUIERDA ── */
    #cover-content {
      position: relative; z-index: 10;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: flex-start;   /* alineación izquierda */
      justify-content: center;   /* centrado vertical */
      padding: 0 0rem 0 8vw;    /* margen izquierdo 8% */
      max-width: 540px;          /* ancho máximo del bloque de texto */
      text-align: left;
      transition: opacity .6s ease;
    }

    /* Línea superior de contexto */
    .cover-eyebrow {
      font-size: .62rem; letter-spacing: .28em; text-transform: uppercase;
      color: rgba(0,212,255,.5); margin-bottom: 1.4rem;
    }

    /* Título principal */
    .cover-title {
      font-size: clamp(2.6rem, 7vw, 5rem); color: var(--cyan);
      text-shadow: 0 0 20px rgba(0,212,255,.6), 0 0 60px rgba(0,212,255,.25);
      line-height: 1.05; margin-bottom: 1.2rem;
      animation: neon-pulse 3s ease-in-out infinite;
    }

    /* Descripción */
    .cover-sub {
      font-size: clamp(.78rem, 1.4vw, .95rem);
      color: rgba(255,255,255,.5);
      line-height: 1.8; margin-bottom: 2rem;
    }

    /* Contador NEXUS */
    .cover-timer {
      font-size: .72rem; color: var(--danger);
      letter-spacing: .15em; margin-bottom: 2.2rem; opacity: .9;
    }

    /* ── Botones ── */
    .btn-group {
      display: flex; flex-direction: column; gap: .75rem; width: 100%;
    }

    #btn-start {
      font-family: var(--font); font-size: .95rem; letter-spacing: .12em;
      text-transform: uppercase; padding: .85rem 0;
      width: 100%; max-width: 300px;
      background: transparent; border: 1.5px solid var(--cyan); color: var(--cyan);
      border-radius: 4px; cursor: pointer;
      transition: background .25s, color .25s, box-shadow .25s, transform .15s;
    }
    #btn-start:hover {
      background: var(--cyan); color: #000;
      box-shadow: 0 0 30px rgba(0,212,255,.5); transform: translateY(-2px);
    }

    #btn-chapters {
      font-family: var(--font); font-size: .8rem; letter-spacing: .1em;
      text-transform: uppercase; padding: .6rem 0;
      width: 100%; max-width: 300px;
      background: transparent; border: 1px solid rgba(0,212,255,.3);
      color: rgba(0,212,255,.55); border-radius: 4px; cursor: pointer;
      transition: border-color .2s, color .2s;
      text-decoration: none; display: inline-block; text-align: center;
    }
    #btn-chapters:hover { border-color: var(--cyan); color: var(--cyan); }

    #btn-reset {
      font-family: var(--font); font-size: .68rem; padding: 0;
      background: none; border: none; color: rgba(255,255,255,.18);
      cursor: pointer; transition: color .2s; text-align: left;
    }
    #btn-reset:hover { color: var(--danger); }

    /* Aviso ESC */
    #esc-hint {
      position: fixed; bottom: 1.2rem; right: 1.5rem; z-index: 200;
      font-size: .62rem; letter-spacing: .1em; color: rgba(255,255,255,.2);
      font-family: var(--font); pointer-events: none;
      animation: fadeInUp .8s ease 1.5s both;
    }

    /* ── Animaciones ── */
    @keyframes neon-pulse {
      0%, 100% { text-shadow: 0 0 20px rgba(0,212,255,.6), 0 0 60px rgba(0,212,255,.2); }
      50%       { text-shadow: 0 0 35px rgba(0,212,255,.9), 0 0 90px rgba(0,212,255,.4); }
    }
    @keyframes fadeInUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .cover-eyebrow { animation: fadeInUp .8s ease .1s both; }
    .cover-title   { animation: fadeInUp .8s ease .3s both; }
    .cover-sub     { animation: fadeInUp .8s ease .5s both; }
    .cover-timer   { animation: fadeInUp .8s ease .6s both; }
    #btn-start     { animation: fadeInUp .8s ease .7s both; }
    #btn-chapters  { animation: fadeInUp .8s ease .8s both; }
    #btn-reset     { animation: fadeInUp .8s ease .9s both; }
  </style>
</head>
<body>

  <div id="cover-bg" aria-hidden="true"></div>
  <canvas id="matrix-canvas" aria-hidden="true"></canvas>
  <div id="transition-overlay" aria-hidden="true"></div>
  <p id="esc-hint">ESC — salir de pantalla completa</p>

  <main id="cover-content">
    <p class="cover-sub">
      2042 · En un mundo donde el código controla la realidad, un error puede destruirlo todo.<br>
      <br>
      Seguimos la historia de la Ingeniera Alex Vega. Tienes 72 horas.
    </p>
    <p class="cover-timer">
      ⏱ NEXUS — TIEMPO HASTA EJECUCIÓN: <span id="timer-val">72:00:00</span>
    </p>
    <div class="btn-group">
      <button id="btn-start" type="button">Iniciar investigación →</button>
      <button id="btn-reset" type="button">Reiniciar progreso</button>
    </div>
  </main>

  <script src="js/story-state.js"></script>
  <script>
    /* ── Pantalla completa ── */
    function tryFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen({ navigationUI: 'hide' })
          .catch(() => {/* bloqueado por el navegador — sin problema */});
      }
    }
    /* Intentar al cargar */
    tryFullscreen();
    /* Garantizar en primer click del usuario (gesto requerido por algunos navegadores) */
    document.addEventListener('click', tryFullscreen, { once: true });
    /* ESC ya sale de pantalla completa de forma nativa en todos los navegadores */

    /* ── Contador ── */
    function updateTimer() {
      const el = document.getElementById('timer-val');
      if (el) el.textContent = StoryState.getContadorNexus();
    }
    updateTimer();
    setInterval(updateTimer, 1000);

    /* ── Adaptar botón si hay progreso guardado ── */
    const state = StoryState.get();
    if (state.currentNode && state.currentNode !== 'intro') {
      document.getElementById('btn-start').textContent =
        `Continuar — Cap. ${state.capituloActual} →`;
    }

    /* ── Matrix Rain ── */
    function initMatrixRain(canvasId) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      resize();
      window.addEventListener('resize', resize);
      const CHARS = 'アイウエオカキクケコ0123456789ABCDEF<>{}[]();'.split('');
      const FONT_SIZE = 14;
      let drops = Array(Math.floor(canvas.width / FONT_SIZE)).fill(1);
      function draw() {
        ctx.fillStyle = 'rgba(10,13,18,.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00d4ff';
        ctx.font = `${FONT_SIZE}px 'Share Tech Mono', monospace`;
        for (let i = 0; i < drops.length; i++) {
          const char = CHARS[Math.floor(Math.random() * CHARS.length)];
          ctx.fillText(char, i * FONT_SIZE, drops[i] * FONT_SIZE);
          if (drops[i] * FONT_SIZE > canvas.height && Math.random() > .975) drops[i] = 0;
          drops[i]++;
        }
      }
      return setInterval(draw, 50);
    }

    /* ── Secuencia de inicio (SPA) ── */
    let matrixInterval = null;
    document.getElementById('btn-start').addEventListener('click', () => {
      /* Asegurar pantalla completa */
      tryFullscreen();

      const content = document.getElementById('cover-content');
      const bg      = document.getElementById('cover-bg');
      const canvas  = document.getElementById('matrix-canvas');
      const overlay = document.getElementById('transition-overlay');

      content.style.opacity = '0';
      content.style.pointerEvents = 'none';
      bg.style.opacity = '0';

      setTimeout(() => {
        canvas.classList.add('active');
        matrixInterval = initMatrixRain('matrix-canvas');
      }, 400);

      setTimeout(() => { overlay.classList.add('active'); }, 2800);
      setTimeout(() => {
        if (matrixInterval) clearInterval(matrixInterval);
        window.location.href = 'story.html';
      }, 3500);
    });

    /* ── Leer por capítulos: también intentar fullscreen ── */
    document.getElementById('btn-chapters').addEventListener('click', () => {
      tryFullscreen();
    });

    /* ── Reiniciar progreso ── */
    document.getElementById('btn-reset').addEventListener('click', () => {
      if (confirm('¿Reiniciar la historia desde el principio? Se perderá el progreso.')) {
        StoryState.reset();
        document.getElementById('btn-start').textContent = 'Iniciar investigación →';
        updateTimer();
      }
    });
  </script>

</body>
</html>
