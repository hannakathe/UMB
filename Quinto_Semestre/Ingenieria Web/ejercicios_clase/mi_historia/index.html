<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="El Último Commit — Historia interactiva de ciencia ficción sobre IA y el destino de la humanidad.">
  <title>El Último Commit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cyan:   #00d4ff;
      --green:  #00ff88;
      --danger: #ff3d3d;
      --bg:     #0a0d12;
      --font:   'Share Tech Mono', 'Courier New', monospace;
    }
    body { background: var(--bg); color: #eee; font-family: var(--font); overflow: hidden; height: 100vh; }

    /* Fondo imagen de portada */
    #cover-bg {
      position: fixed; inset: 0;
      background: url('assets/img/cover.png') center/cover no-repeat;
      z-index: 0; transition: opacity .8s ease;
    }
    #cover-bg::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(10,13,18,.3) 0%, rgba(10,13,18,.6) 50%, rgba(10,13,18,.95) 100%);
    }

    /* Canvas matrix rain */
    #matrix-canvas {
      position: fixed; inset: 0; z-index: 1;
      opacity: 0; transition: opacity 1.2s ease; pointer-events: none;
    }
    #matrix-canvas.active { opacity: 1; }

    /* Overlay negro para transición */
    #transition-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: var(--bg); opacity: 0;
      pointer-events: none; transition: opacity .7s ease;
    }
    #transition-overlay.active { opacity: 1; pointer-events: all; }

    /* Contenido de portada */
    #cover-content {
      position: relative; z-index: 10;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding: 0 2rem 10vh; text-align: center;
      transition: opacity .6s ease;
    }

    .cover-eyebrow {
      font-size: .65rem; letter-spacing: .3em; text-transform: uppercase;
      color: rgba(0,212,255,.55); margin-bottom: 1.2rem;
    }
    .cover-title {
      font-size: clamp(2.8rem, 9vw, 5.5rem); color: var(--cyan);
      text-shadow: 0 0 20px rgba(0,212,255,.6), 0 0 60px rgba(0,212,255,.25);
      line-height: 1.1; margin-bottom: 1.2rem;
      animation: neon-pulse 3s ease-in-out infinite;
    }
    .cover-sub {
      font-size: clamp(.8rem, 1.6vw, 1rem); color: rgba(255,255,255,.55);
      max-width: 480px; line-height: 1.7; margin-bottom: 2rem;
    }
    .cover-timer {
      font-size: .75rem; color: var(--danger); letter-spacing: .15em;
      margin-bottom: 2rem; opacity: .85;
    }

    /* Botones */
    #btn-start {
      font-family: var(--font); font-size: 1rem; letter-spacing: .12em;
      text-transform: uppercase; padding: .85rem 3rem;
      background: transparent; border: 1.5px solid var(--cyan); color: var(--cyan);
      border-radius: 4px; cursor: pointer;
      transition: background .25s, color .25s, box-shadow .25s, transform .15s;
      margin-bottom: 1rem;
    }
    #btn-start:hover { background: var(--cyan); color: #000; box-shadow: 0 0 30px rgba(0,212,255,.45); transform: translateY(-2px); }

    #btn-chapters {
      font-family: var(--font); font-size: .82rem; letter-spacing: .1em;
      text-transform: uppercase; padding: .6rem 1.8rem;
      background: transparent; border: 1px solid rgba(0,212,255,.35); color: rgba(0,212,255,.6);
      border-radius: 4px; cursor: pointer;
      transition: border-color .2s, color .2s; margin-bottom: .75rem;
      text-decoration: none; display: inline-block;
    }
    #btn-chapters:hover { border-color: var(--cyan); color: var(--cyan); }

    #btn-reset {
      font-family: var(--font); font-size: .72rem;
      background: none; border: none; color: rgba(255,255,255,.2);
      cursor: pointer; transition: color .2s;
    }
    #btn-reset:hover { color: var(--danger); }

    @keyframes neon-pulse {
      0%, 100% { text-shadow: 0 0 20px rgba(0,212,255,.6), 0 0 60px rgba(0,212,255,.2); }
      50%       { text-shadow: 0 0 30px rgba(0,212,255,.9), 0 0 80px rgba(0,212,255,.4); }
    }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    .cover-eyebrow { animation: fadeInUp .8s ease .1s both; }
    .cover-title   { animation: fadeInUp .8s ease .3s both; }
    .cover-sub     { animation: fadeInUp .8s ease .5s both; }
    .cover-timer   { animation: fadeInUp .8s ease .6s both; }
    #btn-start     { animation: fadeInUp .8s ease .7s both; }
    #btn-chapters  { animation: fadeInUp .8s ease .8s both; }
    #btn-reset     { animation: fadeInUp .8s ease .9s both; }
  </style>
</head>
<body>

  <div id="cover-bg" aria-hidden="true"></div>
  <canvas id="matrix-canvas" aria-hidden="true"></canvas>
  <div id="transition-overlay" aria-hidden="true"></div>

  <main id="cover-content">
    <p class="cover-eyebrow">Historia interactiva · Ingeniería Web · 2042</p>
    <h1 class="cover-title">El Último<br>Commit</h1>
    <p class="cover-sub">
      En un mundo donde el código controla la realidad,<br>
      un error puede destruirlo todo.<br>
      Tú eres Alex Vega. Tienes 72 horas.
    </p>
    <p class="cover-timer">
      ⏱ NEXUS — TIEMPO HASTA EJECUCIÓN: <span id="timer-val">72:00:00</span>
    </p>
    <button id="btn-start" type="button">Iniciar investigación →</button>
    <a href="chapters/ch1.html" id="btn-chapters">Leer por capítulos</a>
    <button id="btn-reset" type="button">Reiniciar progreso</button>
  </main>

  <script src="js/story-state.js"></script>
  <script>
    /* Contador */
    function updateTimer() {
      const el = document.getElementById('timer-val');
      if (el) el.textContent = StoryState.getContadorNexus();
    }
    updateTimer();
    setInterval(updateTimer, 1000);

    /* Adaptar botón si hay progreso */
    const state = StoryState.get();
    if (state.currentNode && state.currentNode !== 'intro') {
      document.getElementById('btn-start').textContent = `Continuar — Cap. ${state.capituloActual} →`;
    }

    /* Matrix Rain */
    function initMatrixRain(canvasId) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      resize();
      window.addEventListener('resize', resize);
      const CHARS = 'アイウエオカキクケコ0123456789ABCDEF<>{}[]();'.split('');
      const FONT_SIZE = 14;
      let drops = Array(Math.floor(canvas.width / FONT_SIZE)).fill(1);
      function draw() {
        ctx.fillStyle = 'rgba(10,13,18,.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00d4ff';
        ctx.font = `${FONT_SIZE}px 'Share Tech Mono', monospace`;
        for (let i = 0; i < drops.length; i++) {
          const char = CHARS[Math.floor(Math.random() * CHARS.length)];
          ctx.fillText(char, i * FONT_SIZE, drops[i] * FONT_SIZE);
          if (drops[i] * FONT_SIZE > canvas.height && Math.random() > .975) drops[i] = 0;
          drops[i]++;
        }
      }
      return setInterval(draw, 50);
    }

    /* Secuencia de inicio al botón principal (SPA) */
    let matrixInterval = null;
    document.getElementById('btn-start').addEventListener('click', () => {
      const content = document.getElementById('cover-content');
      const bg      = document.getElementById('cover-bg');
      const canvas  = document.getElementById('matrix-canvas');
      const overlay = document.getElementById('transition-overlay');

      content.style.opacity = '0';
      content.style.pointerEvents = 'none';
      bg.style.opacity = '0';

      setTimeout(() => {
        canvas.classList.add('active');
        matrixInterval = initMatrixRain('matrix-canvas');
      }, 400);

      setTimeout(() => { overlay.classList.add('active'); }, 2800);
      setTimeout(() => {
        if (matrixInterval) clearInterval(matrixInterval);
        window.location.href = 'story.html';
      }, 3500);
    });

    /* Reiniciar */
    document.getElementById('btn-reset').addEventListener('click', () => {
      if (confirm('¿Reiniciar la historia desde el principio? Se perderá el progreso.')) {
        StoryState.reset();
        document.getElementById('btn-start').textContent = 'Iniciar investigación →';
        updateTimer();
      }
    });
  </script>

</body>
</html>
