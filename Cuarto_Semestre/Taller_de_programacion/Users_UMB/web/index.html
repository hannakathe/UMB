<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Usuarios UMB - CRUD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Gestión de Clientes</h1>

  <form id="clienteForm">
    <input type="text" id="nombres" placeholder="Nombre completo" required>
    <input type="email" id="correo" placeholder="Correo" required>
    <input type="text" id="direccion" placeholder="Dirección" required>
    <input type="text" id="celular" placeholder="Celular" required>
    <button type="submit">Agregar Cliente</button>
  </form>

  <table id="tablaClientes">
    <thead>
      <tr><th>Nombre</th><th>Correo</th><th>Celular</th><th>Acciones</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="app.js"></script>
</body>
</html>
